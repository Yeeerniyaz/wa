version: '3.8'

services:
  wa-bot:
    build: .
    container_name: wa-baileys
    restart: unless-stopped
    environment:
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    deploy:
      resources:
        limits:
          memory: 350M   # Baileys без Chrome — достаточно 256MB
        reservations:
          memory: 64M
    volumes:
      - /opt/wa_bot/data:/app/data       # Единая папка для сессии и БД (решает баг Docker)
    stdin_open: true   # для первоначального QR-кода
    tty: true