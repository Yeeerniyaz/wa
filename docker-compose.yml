version: '3.8'

services:
  wa-bot:
    build: .
    container_name: wa-always-online
    restart: unless-stopped
    environment:
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    deploy:
      resources:
        limits:
          memory: 1G # Контейнер умрет, но не съест больше 1 ГБ
        reservations:
          memory: 256M
    volumes:
      - /opt/wa_bot/session:/app/.wwebjs_auth
      - /opt/wa_bot/database.json:/app/database.json
      - /opt/wa_bot/bot.log:/app/bot.log