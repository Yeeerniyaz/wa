version: '3.8'

services:
  wa-bot:
    build: .
    container_name: wa-baileys
    restart: unless-stopped
    environment:
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    deploy:
      resources:
        limits:
          memory: 350M   # Baileys без Chrome — достаточно 256MB
        reservations:
          memory: 64M
    volumes:
      - /opt/wa_bot/auth_info:/app/auth_info       # Baileys-сессия
      - /opt/wa_bot/database.json:/app/database.json
      - /opt/wa_bot/bot.log:/app/bot.log
    stdin_open: true   # для первоначального QR-кода
    tty: true