version: '3.8'

services:
  wa-bot:
    build: .
    container_name: wa-baileys
    restart: unless-stopped
    environment:
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    deploy:
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 64M
    volumes:
      - wa_data:/app/data       # Меняем жесткую ссылку на Именованный Том
    stdin_open: true
    tty: true

# Объявляем защищенный том для Portainer
volumes:
  wa_data:
    name: wa_bot_persistent_data