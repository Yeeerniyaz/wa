version: '3.8'

services:
  wa-bot:
    build: .
    container_name: wa-baileys
    restart: unless-stopped
    environment:
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    deploy:
      resources:
        limits:
          memory: 550M
        reservations:
          memory: 200M
    volumes:
      - wa_data:/app/data
    stdin_open: true
    tty: true

volumes:
  wa_data:
    name: wa_bot_persistent_data